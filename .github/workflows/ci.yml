name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify lockfile + lint + formatting + type checks + site config
        run: npm run verify

      - name: Validate workflow gate integrity
        run: npm run check:workflows

      - name: Validate Cloudflare redirects
        run: npm run check:redirects-cloudflare

      - name: Simulate navigation routes
        run: npm run check:navigation-sim

      - name: Run local SEO CI audit
        run: npm run localseo:ci

      - name: Security audit (high+)
        if: github.event_name == 'push'
        run: npm run security:audit
