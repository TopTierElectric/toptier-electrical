name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Enforce performance budgets
        run: npm run check:performance-budgets

      - name: Verify lockfile + lint + formatting + type checks + site config
        run: npm run verify

      - name: Run unit QA tests
        run: npm run test

      - name: Validate workflow gate integrity
        run: npm run check:workflows

      - name: Simulate navigation routes
        run: npm run check:navigation-sim

      - name: Run local SEO CI audit
        run: npm run localseo:ci

      - name: Check SEO render quality
        run: npm run check:seo-render

      - name: Check integration scaffolding
        run: npm run check:integrations

      - name: Check route governance
        run: npm run check:route-governance

      - name: Check review schema policy
        run: npm run check:review-schema-policy

      - name: Check schema graph integrity
        run: npm run check:schema-graph

      - name: Check image markup hygiene
        run: npm run check:image-markup

      - name: Check phone normalization
        run: npm run check:phone-normalization

      - name: Check identity drift
        run: npm run check:identity-drift

      - name: Check sitemap and robots
        run: npm run check:sitemap-robots

      - name: Run e2e smoke checks
        run: npm run test:e2e:smoke

      - name: Security audit (high+)
        # Note: a moderate-severity Astro 5.x advisory (define:vars XSS)
        # remains. Clearing it requires bumping to Astro 6.x — a major
        # version bump tracked separately. --audit-level=high catches
        # the rest.
        run: npm audit --audit-level=high
