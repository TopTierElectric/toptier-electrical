name: Uptime Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      RUNBOOK_URL: https://github.com/${{ github.repository }}/blob/main/docs/incident-runbook.md
      MAINTENANCE_MODE: ${{ vars.MAINTENANCE_MODE || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate monitoring config
        run: npm run verify:monitoring-config

      - name: Run uptime checks
        run: npm run monitor:uptime

      - name: Upload monitoring artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uptime-monitoring-results
          path: artifacts/monitoring-results.json

      - name: Build failure payload
        if: failure()
        id: payload
        run: |
          FAILED_CHECKS=$(node -e "const fs=require('fs');const p='artifacts/monitoring-results.json';if(!fs.existsSync(p)){console.log('unknown');process.exit(0)};const data=JSON.parse(fs.readFileSync(p,'utf8'));console.log((data.failedChecks||[]).map(c=>`${c.id} (${c.url})`).join('; ')||'unknown')")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "json={\"text\":\"Uptime monitor failed. Run: ${RUN_URL} | Failed checks: ${FAILED_CHECKS} | Timestamp: ${TIMESTAMP} | Runbook: ${RUNBOOK_URL}\"}" >> "$GITHUB_OUTPUT"

      - name: Alert Slack
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl --fail --silent --show-error --max-time 20 --retry 3 --retry-all-errors --retry-delay 2 \
            -H 'Content-Type: application/json' \
            -d '${{ steps.payload.outputs.json }}' \
            '${{ secrets.SLACK_WEBHOOK_URL }}'

      - name: Alert email webhook
        if: failure() && secrets.EMAIL_WEBHOOK_URL != ''
        run: |
          curl --fail --silent --show-error --max-time 20 --retry 3 --retry-all-errors --retry-delay 2 \
            -H 'Content-Type: application/json' \
            -d '${{ steps.payload.outputs.json }}' \
            '${{ secrets.EMAIL_WEBHOOK_URL }}'

      - name: Alert PagerDuty Events API
        if: failure() && secrets.PAGERDUTY_EVENTS_URL != '' && secrets.PAGERDUTY_ROUTING_KEY != ''
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl --fail --silent --show-error --max-time 20 --retry 3 --retry-all-errors --retry-delay 2 \
            -H 'Content-Type: application/json' \
            -d "{\"routing_key\":\"${{ secrets.PAGERDUTY_ROUTING_KEY }}\",\"event_action\":\"trigger\",\"payload\":{\"summary\":\"Top Tier Electrical uptime failure\",\"severity\":\"critical\",\"source\":\"github-actions\",\"timestamp\":\"${TIMESTAMP}\",\"custom_details\":{\"run_url\":\"${RUN_URL}\",\"runbook_url\":\"${RUNBOOK_URL}\"}}}" \
            '${{ secrets.PAGERDUTY_EVENTS_URL }}'
