name: Lighthouse on PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

# Wait for the Cloudflare Pages preview deployment to finish before
# auditing it. The Pages app posts a `Cloudflare Pages` check + a sticky
# comment with the preview URL when the deploy succeeds.
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for Cloudflare Pages deploy comment
        id: wait
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 30;
            const delayMs = 30000;
            const headSha = context.payload.pull_request.head.sha;
            const shortSha = headSha.substring(0, 7);
            core.info(`Waiting for Cloudflare Pages deploy of ${shortSha} (full: ${headSha})`);
            for (let i = 0; i < maxAttempts; i++) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                per_page: 100,
              });
              const cf = comments
                .filter((c) => c.user && c.user.login === 'cloudflare-workers-and-pages[bot]')
                .filter((c) => c.body && c.body.includes(`<code>${shortSha}</code>`))
                .filter((c) => c.body.includes('Deploy successful'))
                .reverse()[0];
              if (cf) {
                const match = cf.body.match(/https:\/\/[a-z0-9-]+\.toptier-electrical\.pages\.dev/);
                if (match) {
                  core.setOutput('url', match[0]);
                  core.info('Found preview URL for ' + shortSha + ': ' + match[0]);
                  return;
                }
              }
              core.info(
                `Attempt ${i + 1}/${maxAttempts}: deploy comment for ${shortSha} not ready yet, waiting ${delayMs}ms`
              );
              await new Promise((r) => setTimeout(r, delayMs));
            }
            core.setFailed(
              `Cloudflare Pages preview deploy for commit ${shortSha} did not complete within 15 minutes`
            );

      - name: Run Lighthouse via PSI API (mobile)
        id: psi
        if: steps.wait.outputs.url
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.wait.outputs.url }}";
            const target = encodeURIComponent(url);
            const apiUrl =
              `https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${target}&strategy=mobile` +
              `&category=performance&category=accessibility&category=best-practices&category=seo`;
            const resp = await fetch(apiUrl);
            if (!resp.ok) {
              core.setFailed(`PSI API returned ${resp.status}`);
              return;
            }
            const json = await resp.json();
            const cats = json.lighthouseResult && json.lighthouseResult.categories;
            if (!cats) {
              core.setFailed('PSI response missing categories');
              return;
            }
            const score = (cat) => Math.round((cats[cat]?.score ?? 0) * 100);
            const perf = score('performance');
            const a11y = score('accessibility');
            const bp = score('best-practices');
            const seo = score('seo');
            core.setOutput('perf', perf);
            core.setOutput('a11y', a11y);
            core.setOutput('bp', bp);
            core.setOutput('seo', seo);
            core.setOutput('url', url);

      - name: Comment scores on PR
        if: steps.psi.outputs.perf
        uses: actions/github-script@v7
        with:
          script: |
            const perf = ${{ steps.psi.outputs.perf || 0 }};
            const a11y = ${{ steps.psi.outputs.a11y || 0 }};
            const bp = ${{ steps.psi.outputs.bp || 0 }};
            const seo = ${{ steps.psi.outputs.seo || 0 }};
            const url = "${{ steps.psi.outputs.url }}";
            const emoji = (n) => (n >= 96 ? '🟢' : n >= 90 ? '🟡' : '🔴');
            const body = [
              '## Lighthouse on PR preview',
              '',
              `Audited: \`${url}\` (mobile, Slow 4G via PSI API)`,
              '',
              '| Score | Value | |',
              '|---|---|---|',
              `| Performance | ${perf} | ${emoji(perf)} |`,
              `| Accessibility | ${a11y} | ${emoji(a11y)} |`,
              `| Best Practices | ${bp} | ${emoji(bp)} |`,
              `| SEO | ${seo} | ${emoji(seo)} (preview always low; noindex by design) |`,
              '',
              '_Score legend: 🟢 ≥96 · 🟡 ≥90 · 🔴 <90._',
              '_SEO is intentionally not gated on preview deploys because they ship `X-Robots-Tag: noindex, nofollow`. Only Performance / Accessibility / Best Practices are checked against the regression floor. Production-side SEO is verified separately._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Fail job if Performance / Accessibility / Best Practices regressed
        if: steps.psi.outputs.perf
        run: |
          PERF="${{ steps.psi.outputs.perf }}"
          A11Y="${{ steps.psi.outputs.a11y }}"
          BP="${{ steps.psi.outputs.bp }}"
          # Performance floor 80: PSI single-run variance can swing ±10 points
          # on Slow 4G mobile. 80 catches genuine regressions while absorbing
          # noise. A11y and BP floor 90: those are stable across runs.
          # SEO is NOT gated here — preview URLs ship `X-Robots-Tag: noindex,
          # nofollow` from src/middleware.ts so they always score ~70 by
          # design. Production-side SEO is verified by manual PSI on the
          # apex after merge.
          if [ "$PERF" -lt 80 ] || [ "$A11Y" -lt 90 ] || [ "$BP" -lt 90 ]; then
            echo "Lighthouse regression on preview: P=$PERF A=$A11Y BP=$BP"
            echo "Floors: P>=80, A>=90, BP>=90 (SEO ungated due to noindex header)"
            exit 1
          fi
